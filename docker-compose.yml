services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: casheer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pipinstallpython--upgrade
      POSTGRES_DB: casheer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: casheer-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: ./casheer-auth-service
      dockerfile: Dockerfile
    container_name: casheer-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: pipinstallpython--upgrade
      DB_NAME: casheer_db
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      DATABASE_URL: postgresql://postgres:pipinstallpython--upgrade@postgres:5432/casheer_db?sslmode=disable
      PORT: 3001
      APP_NAME: Casheer Auth Service
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRY_HOURS: 24
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret
    depends_on:
      postgres:
        condition: service_healthy

  # Menu Service
  menu-service:
    build:
      context: ./casheer-menu-service
      dockerfile: Dockerfile
    container_name: casheer-menu
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: pipinstallpython--upgrade
      DB_NAME: casheer_db
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      DATABASE_URL: postgresql://postgres:pipinstallpython--upgrade@postgres:5432/casheer_db?sslmode=disable
      PORT: 3002
      APP_NAME: Casheer Menu Service
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy

  # Report Service
  report-service:
    build:
      context: ./casheer-report-service
      dockerfile: Dockerfile
    container_name: casheer-report
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: pipinstallpython--upgrade
      DB_NAME: casheer_db
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      DATABASE_URL: postgresql://postgres:pipinstallpython--upgrade@postgres:5432/casheer_db?sslmode=disable
      PORT: 3003
      APP_NAME: Casheer Report Service
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data: